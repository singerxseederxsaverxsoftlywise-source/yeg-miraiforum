<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WBS管理 | 未来フォーラム 彦根</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header id="header">
    <div class="header-top">
      <div class="project-info">
        <h1 id="proj-name">読込中...</h1>
        <div class="sub" id="proj-sub"></div>
      </div>
      <div class="header-actions" style="display:flex;align-items:center;gap:20px;">
        <div class="filter-controls" style="display:flex;gap:12px;font-size:11px;color:var(--text2);align-items:center;">
          <span style="font-weight:600">表示切替:</span>
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="filter-l1" checked> 第一階層</label>
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="filter-l2" checked> 第二階層</label>
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="filter-l3" checked> 第三階層</label>
        </div>
        <div class="progress-wrap">
          <div class="progress-label" id="prog-label">0 / 0 (0%)</div>
          <div class="progress-bar">
            <div class="progress-fill" id="prog-fill" style="width:0%"></div>
          </div>
        </div>
      </div>
    </div>
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="wbs">📋 WBS</button>
      <button class="tab-btn" data-tab="gantt">📅 ガントチャート</button>
      <button class="tab-btn" data-tab="personnel">👥 人員一覧</button>
      <button class="tab-btn" data-tab="prep">📦 準備物一覧</button>
      <button class="tab-btn" data-tab="assignee">👤 担当者別</button>
      <button class="tab-btn" data-tab="deadline">📆 締切日順</button>
    </nav>
  </header>

  <div id="main">

    <!-- WBS View -->
    <div id="wbs-view" class="active">
      <div class="wbs-content" id="wbs-content"></div>
      <aside id="detail-panel">
        <div style="display:flex;align-items:center;margin-bottom:14px">
          <span class="detail-title" id="d-title" style="margin-bottom:0;flex:1">タスク詳細</span>
          <button class="close-panel" id="close-panel">×</button>
        </div>
        <div class="detail-field">
          <div class="detail-label">名称</div>
          <input class="detail-input" type="text" id="d-name-input" placeholder="名称を入力">
          <div id="d-title2" style="font-size:11px;color:var(--text2);margin-top:4px"></div>
        </div>
        <div class="detail-field">
          <div class="detail-label">担当者</div>
          <input class="detail-input" type="text" id="d-tanto" placeholder="担当者名">
        </div>
        <div style="display:flex;gap:8px">
          <div class="detail-field" style="flex:1">
            <div class="detail-label">開始日</div>
            <input class="detail-input" type="date" id="d-start">
          </div>
          <div class="detail-field" style="flex:1">
            <div class="detail-label">締切日</div>
            <input class="detail-input" type="date" id="d-end">
          </div>
        </div>
        <div class="detail-field" id="d-type-field">
          <div class="detail-label">カテゴリー</div>
          <select class="detail-input" id="d-type">
            <option value="personnel">👤 人員</option>
            <option value="prep">📦 準備物</option>
          </select>
        </div>
        <div class="detail-field" id="d-color-field">
          <div class="detail-label">表示カラー (階層用)</div>
          <input type="color" id="d-color" class="detail-input" style="height:34px;padding:2px">
        </div>
        <div class="detail-field">
          <div class="detail-label">ステータス</div>
          <select class="detail-input" id="d-status">
            <option value="open">未完了</option>
            <option value="done">✅ 完了</option>
          </select>
        </div>
        <div class="detail-field">
          <div class="detail-label">優先度</div>
          <select class="detail-input" id="d-prio">
            <option value="high">🔴 高</option>
            <option value="mid">🟡 中</option>
            <option value="low">🟢 低</option>
          </select>
        </div>
        <div class="detail-field">
          <div class="detail-label">メモ</div>
          <textarea class="detail-input" id="d-memo" placeholder="メモ・備考"></textarea>
        </div>
        <button class="detail-save-btn" id="save-detail">💾 保存</button>
        <button class="detail-del-btn" id="del-task">🗑 削除</button>
      </aside>
    </div>

    <!-- Gantt View -->
    <div id="gantt-view" class="view"></div>

    <!-- Personnel List View -->
    <div id="personnel-view" class="view"></div>

    <!-- Prep Items List View -->
    <div id="prep-view" class="view"></div>

    <!-- Assignee View -->
    <div id="assignee-view" class="view"></div>

    <!-- Deadline View -->
    <div id="deadline-view" class="view"></div>

  </div>

  <script src="tasks.js"></script>
  <script src="app.js"></script>

</body>

</html>
